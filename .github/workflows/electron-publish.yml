name: Build and publish Electron app

# Trigger on version tags (e.g. v1.2.3), every merge to main, or manual dispatch.
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: dist-electron/*.exe
          - os: macos-latest
            platform: mac
            artifact: dist-electron/*.dmg
          - os: ubuntu-20.04   # Use 20.04 for broadest GLIBC compatibility
            platform: linux
            artifact: dist-electron/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Linux: install system libraries required by Electron / AppImage builder
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-20.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            libgbm-dev

      - name: Build Next.js (standalone output)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      # Configure macOS code signing only when a certificate secret is present.
      # Passing CSC_LINK as an empty string causes electron-builder to resolve
      # it to the working directory path, producing a "not a file" error.
      - name: Configure macOS code signing
        if: runner.os == 'macOS'
        run: |
          if [ -n "$MAC_CERT" ]; then
            echo "CSC_LINK=$MAC_CERT" >> $GITHUB_ENV
            echo "CSC_KEY_PASSWORD=$MAC_CERT_PWD" >> $GITHUB_ENV
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> $GITHUB_ENV
          fi
        env:
          MAC_CERT: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERT_PWD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}

      - name: Build Electron app (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When triggered by a branch push (not a tag), tell electron-builder
          # which release tag to publish to.  On tag pushes GITHUB_REF already
          # contains refs/tags/vX.Y.Z so this override is a no-op.
          GITHUB_REF: ${{ startsWith(github.ref, 'refs/tags/') && github.ref || 'refs/tags/latest' }}
          # macOS signing vars are set conditionally by the step above.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ----------------------------------------------------------------
          # Windows code signing (optional; unsigned builds trigger SmartScreen)
          # ----------------------------------------------------------------
          WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f1-dashboard-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn
