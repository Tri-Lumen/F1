name: Build and publish Electron app

# Trigger on version tags (e.g. v1.2.3) or manual dispatch.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: dist-electron/*.exe
          - os: macos-latest
            platform: mac
            artifact: dist-electron/*.dmg
          - os: ubuntu-20.04   # Use 20.04 for broadest GLIBC compatibility
            platform: linux
            artifact: dist-electron/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Linux: install system libraries required by Electron / AppImage builder
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-20.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            libgbm-dev

      - name: Build Next.js (standalone output)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Build Electron app (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ----------------------------------------------------------------
          # macOS code signing (requires secrets set in repository settings)
          # Leave unset for unsigned development builds — Gatekeeper will
          # block the app on first launch; users can right-click > Open.
          # ----------------------------------------------------------------
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ----------------------------------------------------------------
          # Windows code signing (optional; unsigned builds trigger SmartScreen)
          # ----------------------------------------------------------------
          WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f1-dashboard-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn
