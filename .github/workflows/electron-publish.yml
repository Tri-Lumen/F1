name: Build and publish Electron app

# Trigger on version tags (e.g. v1.2.3), manual dispatch, or an explicit
# branch push.  The branch trigger is used to kick off the first release
# from the feature branch before it is merged to main.
on:
  push:
    tags:
      - 'v*'
    branches:
      - 'claude/exe-packaging-feasibility-*'
      - 'claude/setup-npm-ci-*'
  workflow_dispatch:

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: dist-electron/*.exe
          - os: macos-latest
            platform: mac
            artifact: dist-electron/*.dmg
          - os: ubuntu-20.04   # Use 20.04 for broadest GLIBC compatibility
            platform: linux
            artifact: dist-electron/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Linux: install system libraries required by Electron / AppImage builder
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-20.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            libgbm-dev

      - name: Build Next.js (standalone output)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Build Electron app (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When triggered by a branch push (not a tag), tell electron-builder
          # which release tag to publish to.  On tag pushes GITHUB_REF already
          # contains refs/tags/vX.Y.Z so this override is a no-op.
          GITHUB_REF: ${{ startsWith(github.ref, 'refs/tags/') && github.ref || format('refs/tags/v{0}', '1.0.0') }}
          # ----------------------------------------------------------------
          # macOS code signing (requires secrets set in repository settings)
          # Leave unset for unsigned development builds — Gatekeeper will
          # block the app on first launch; users can right-click > Open.
          # ----------------------------------------------------------------
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ----------------------------------------------------------------
          # Windows code signing (optional; unsigned builds trigger SmartScreen)
          # ----------------------------------------------------------------
          WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f1-dashboard-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn
