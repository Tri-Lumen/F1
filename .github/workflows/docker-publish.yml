name: Build and publish Docker image

on:
  push:
    branches: [main]
    # Skip the rebuild for changes that don't affect the runtime image:
    # docs, installer scripts, electron-only files, design preview, and
    # the other workflows.  Watchtower will not have anything new to pull.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'installer/**'
      - 'electron/**'
      - 'design-preview/**'
      - 'build/**'
      - '.github/workflows/electron-publish.yml'
      - '.github/workflows/build-bootstrapper.yml'
      - 'LICENSE'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/tri-lumen/f1

# Cancel an in-flight image build when a newer commit lands on main —
# only the latest commit's image needs to be tagged :latest.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Re-use buildx layers across runs via the GitHub Actions cache.
          # Cuts a clean rebuild from ~4 minutes to ~30 s when only app code
          # changes (npm install layer is reused).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        run: |
          curl -s -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/Tri-Lumen/packages/container/f1 \
            -d '{"visibility":"public"}' || echo "Could not set visibility — set it manually in Package Settings"
