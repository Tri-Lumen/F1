services:
  f1-dashboard:
    image: ghcr.io/tri-lumen/f1:latest
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    # Allow the in-app git pull to reach the host's git server
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Watchtower automatically pulls the latest image and restarts the container
  # whenever a new version is pushed to the registry. No manual rebuilds needed.
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Pass host Docker credentials so Watchtower can pull from private registries
      # (e.g. ghcr.io). Run docker-install.sh first to populate this file.
      # ${HOME} may be unset in Portainer stacks, so fall back to /root.
      - ${HOME:-/root}/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_LABEL_ENABLE=false
    command: --interval 3600 f1-dashboard
