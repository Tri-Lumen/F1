services:
  f1-dashboard:
    build: .
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    # Allow the in-app git pull to reach the host's git server
    extra_hosts:
      - "host.docker.internal:host-gateway"
